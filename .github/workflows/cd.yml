name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: self-hosted
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Build Docker image
        run: docker build -t angelduzt/cd_docker_project:latest .

      - name: Log in to Docker Hub
        run: echo '${{ secrets.DOCKER_PASSWORD }}' | docker login -u '${{ secrets.DOCKER_USERNAME }}' --password-stdin

      - name: Push Docker image to Docker Hub
        run: docker push angelduzt/cd_docker_project:latest

  deploy:
    needs: build
    runs-on: self-hosted
    steps:
      - name: Pull latest image and restart containers
        run: |
          docker-compose pull
          docker-compose down
          docker-compose up -d

